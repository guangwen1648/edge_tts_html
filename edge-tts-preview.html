      </div>
    </div>
    <div class="field">
      <label>音量 <span class="hint">(-50% ~ +100%)</span></label>
      <div class="slider-row">
        <input type="range" id="genVolume" min="-50" max="100" value="0" step="5">
        <span class="val" id="genVolumeVal">+0%</span>
      </div>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:6px;margin:8px 0 4px;">
      <input type="checkbox" id="genSave" checked>
      <label for="genSave" style="margin:0;cursor:pointer;">保存到 generated/ <span class="hint">(带文案前10字)</span></label>
    </div>
    <button class="gen-btn" id="genBtn" onclick="doGenerate()">生成</button>
    <div class="status" id="genStatus"></div>
    <div class="result" id="genResult">
      <audio id="genAudio" controls></audio>
      <a class="dl" id="dlLink" download="tts.mp3">⬇ 下载 MP3</a>
    </div>
  </div>
</div>

const SAMPLE_DIR = 'edge-tts-samples/all/';

const byLocale = {};
ALL_VOICES.forEach(v => {
  if (!byLocale[v.Locale]) byLocale[v.Locale] = [];
  byLocale[v.Locale].push(v);
});

const langSet = Object.keys(byLocale).sort();
let sortDesc = false;
function renderLangFilter() {
  const langFilter = document.getElementById('langFilter');
  // 保留第一项 "所有语言"，清掉其它
  while (langFilter.options.length > 1) langFilter.remove(1);
  const sorted = sortDesc ? [...langSet].sort().reverse() : langSet;
  sorted.forEach(loc => {
    const opt = document.createElement('option');
    opt.value = loc; opt.textContent = `${loc} (${byLocale[loc].length})`;
    langFilter.appendChild(opt);
  });
}
renderLangFilter();

// === 侧边栏：Locale 排序方向（默认升序 A→Z，倒序 Z→A 让 zh-* 排到顶部） ===
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  const sorted = sortDesc ? [...langSet].sort().reverse() : [...langSet].sort();
  sorted.forEach(loc => {
    const grp = document.createElement('div');
    grp.className = 'locale-group';
    const voices = byLocale[loc];
    const haveCount = voices.filter(v => HAVE_AUDIO.has(v.ShortName)).length;
    grp.innerHTML = `
      <div class="locale-header" data-locale="${loc}">
        <span>${loc}</span>
        <span class="count">${haveCount}/${voices.length}</span>
      </div>
    `;
    grp.querySelector('.locale-header').onclick = () => {
      document.getElementById('langFilter').value = loc;
      applyFilters();
      document.getElementById('main').scrollIntoView({ behavior: 'smooth' });
    };
    sidebar.appendChild(grp);
  });
}
function toggleSort() {
  sortDesc = !sortDesc;
  const btn = document.getElementById('sortToggle');
  btn.textContent = sortDesc ? '↑ A→Z' : '↓ Z→A';
  btn.title = sortDesc ? '当前：倒序（Z→A），点击切回升序' : '当前：升序（A→Z），点击切换倒序';
  renderSidebar();
  renderLangFilter();
  applyFilters();
}
renderSidebar();

let activeVoice = null;

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const langF = document.getElementById('langFilter').value;
  const genF = document.getElementById('genderFilter').value;
  const audioOnly = document.getElementById('audioOnly').checked;
  const main = document.getElementById('main');
  main.innerHTML = '';
  let visibleCount = 0;

  const sortedLocs = sortDesc ? [...langSet].sort().reverse() : langSet;
  sortedLocs.forEach(loc => {
    let voices = byLocale[loc].slice();
    if (langF && loc !== langF) return;
    if (genF) voices = voices.filter(v => v.Gender === genF);
    if (audioOnly) voices = voices.filter(v => HAVE_AUDIO.has(v.ShortName));
    if (q) {
      voices = voices.filter(v =>
        (v.ShortName || '').toLowerCase().includes(q) ||
        (v.FriendlyName || '').toLowerCase().includes(q) ||
        (v.Locale || '').toLowerCase().includes(q) ||
        (v.cn_display || '').toLowerCase().includes(q) ||
        (v.cn_lang || '').toLowerCase().includes(q) ||
        (v.cn_region || '').toLowerCase().includes(q)
      );
    }
    if (voices.length === 0) return;

    const section = document.createElement('div');
    section.className = 'lang-section';
    section.dataset.locale = loc;
    const haveCount = voices.filter(v => HAVE_AUDIO.has(v.ShortName)).length;
    section.innerHTML = `
      <div class="lang-title">
        <span>${loc}</span>
        <span class="count">${haveCount} / ${voices.length} 已有音频</span>
      </div>
      <div class="voice-grid"></div>
    `;
    const grid = section.querySelector('.voice-grid');

    voices.forEach(v => {
      visibleCount++;
      const haveAudio = HAVE_AUDIO.has(v.ShortName);
      const cnDisplay = v.cn_display || v.Locale;
      const card = document.createElement('div');
      card.className = 'voice-card';
      card.dataset.shortName = v.ShortName;
      if (q && (v.ShortName.toLowerCase().includes(q) || (v.cn_display||'').toLowerCase().includes(q))) {
        card.classList.add('match');
      }
      if (activeVoice === v.ShortName) card.classList.add('active');
      const audioHtml = haveAudio
        ? `<audio controls preload="none" src="${SAMPLE_DIR}${v.ShortName}.mp3"></audio>`
        : `<span class="no-audio">⚠ 暂无试听</span>`;
      card.innerHTML = `
        <div class="voice-name">${v.ShortName}</div>
        <div class="voice-info">
          <span class="gender gender-${v.Gender}">${v.cn_gender || v.Gender}</span>
          <span class="cn-display" title="${v.FriendlyName}">${cnDisplay}</span>
        </div>
        <div class="audio-row">
          ${audioHtml}
          <button class="gen" onclick="openPanel('${v.ShortName}')">生成</button>
          <button onclick="copyName('${v.ShortName}', this)">复制</button>
        </div>
      `;
      grid.appendChild(card);
    });

    main.appendChild(section);
  });

  document.getElementById('visibleStat').textContent = `显示 ${visibleCount} / ${ALL_VOICES.length} 个`;
}

function copyName(name, btn) {
  navigator.clipboard.writeText(name).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1200);
  });
}

// ========== 右侧滑出面板 ==========
function openPanel(shortName) {
  const v = ALL_VOICES.find(x => x.ShortName === shortName);
  if (!v) return;
  activeVoice = shortName;
  document.querySelectorAll('.voice-card.active').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.voice-card[data-short-name="${shortName}"]`);
  if (card) card.classList.add('active');

  const cnDisplay = v.cn_display || v.Locale;
  document.getElementById('panelVoiceInfo').innerHTML = `
    <div class="name">${shortName}</div>
    <div class="meta">${cnDisplay}</div>
  `;
  document.getElementById('genText').value = '';
  document.getElementById('genStatus').className = 'status';
  document.getElementById('genStatus').textContent = '';
  document.getElementById('genResult').className = 'result';
  document.getElementById('genAudio').src = '';
  document.getElementById('genPanel').classList.add('open');
  document.getElementById('main').classList.add('with-panel');
  setTimeout(() => document.getElementById('genText').focus(), 300);
}

function closePanel() {
  document.getElementById('genPanel').classList.remove('open');
  document.getElementById('main').classList.remove('with-panel');
  document.querySelectorAll('.voice-card.active').forEach(c => c.classList.remove('active'));
  activeVoice = null;
}

document.getElementById('genRate').oninput = (e) => {
  const v = parseInt(e.target.value);
  document.getElementById('genRateVal').textContent = (v >= 0 ? '+' : '') + v + '%';
};
document.getElementById('genPitch').oninput = (e) => {
  const v = parseInt(e.target.value);
  document.getElementById('genPitchVal').textContent = (v >= 0 ? '+' : '') + v + 'Hz';
};
document.getElementById('genVolume').oninput = (e) => {
  const v = parseInt(e.target.value);
  document.getElementById('genVolumeVal').textContent = (v >= 0 ? '+' : '') + v + '%';
};

async function doGenerate() {
  if (!activeVoice) return;
  const text = document.getElementById('genText').value.trim();
  if (!text) {
    setStatus('请输入文案', 'error');
    return;
  }
  const rate = document.getElementById('genRate').value;
  const pitch = document.getElementById('genPitch').value;
  const volume = document.getElementById('genVolume').value;
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  setStatus(`正在生成: ${activeVoice}...`, 'info');
  document.getElementById('genResult').className = 'result';

  try {
    const save = document.getElementById('genSave').checked;
    const resp = await fetch('http://127.0.0.1:8765/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        voice: activeVoice, text, rate, pitch, volume, save
      })
    });
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errText}`);
    }
    const savedPathB64 = resp.headers.get('X-Saved-Path-B64');
    let savedPath = null;
    if (savedPathB64) {
      try {
        savedPath = decodeURIComponent(escape(atob(savedPathB64)));
      } catch (e) {
        savedPath = '[解码失败: ' + e.message + ']';
      }
    }
    const blob = await resp.blob();
    if (blob.size === 0) throw new Error('空响应');
    const url = URL.createObjectURL(blob);
    const audio = document.getElementById('genAudio');
    audio.src = url;
    audio.play();
    document.getElementById('dlLink').href = url;
    document.getElementById('dlLink').download = `${activeVoice}.mp3`;
    document.getElementById('genResult').className = 'result show';
    const sizeKB = (blob.size/1024).toFixed(1);
    if (savedPath) {
      setStatus(`✅ 生成成功！${sizeKB} KB\n💾 已保存：${savedPath}`, 'success');
    } else {
      setStatus(`✅ 生成成功！${sizeKB} KB`, 'success');
    }
  } catch (e) {
    setStatus(`❌ 生成失败: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '生成';
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('genStatus');
  el.className = `status show ${type}`;
  el.textContent = msg;
}

document.getElementById('searchInput').oninput = applyFilters;
document.getElementById('langFilter').onchange = applyFilters;
document.getElementById('genderFilter').onchange = applyFilters;
document.getElementById('audioOnly').onchange = applyFilters;

applyFilters();
</script>
